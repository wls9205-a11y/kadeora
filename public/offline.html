<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>오프라인 - 카더라</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; color:#e6edf3; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; text-align:center; }
    .logo { display:flex; gap:5px; justify-content:center; margin-bottom:12px; }
    .dot { width:14px; height:14px; border-radius:50%; background:#2563EB; }
    h1 { font-size:24px; font-weight:800; color:#2563EB; margin-bottom:24px; }
    p { font-size:15px; color:#8b949e; line-height:1.6; margin-bottom:24px; }
    button { padding:12px 32px; border-radius:12px; border:none; background:#2563EB; color:#fff; font-size:15px; font-weight:700; cursor:pointer; }
    button:active { opacity:0.8; }
  </style>
</head>
<body>
  <div>
    <div class="logo"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <h1>카더라</h1>
    <p>인터넷 연결을 확인해주세요.<br>연결되면 자동으로 복구됩니다.</p>
    <button onclick="location.reload()">새로고침</button>
  </div>
</body>
</html>
