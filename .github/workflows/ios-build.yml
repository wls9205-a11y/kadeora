name: iOS Build (PWA)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install PWABuilder CLI
        run: npm install -g @nicemobiledeveloper/pwabuilder 2>/dev/null || true

      - name: Generate iOS project via PWABuilder
        run: |
          mkdir -p ios-output
          cd ios-output
          # PWABuilder API를 통해 iOS 프로젝트 생성
          curl -X POST "https://pwabuilder-ios.azurewebsites.net/packages/create" \
            -H "Content-Type: application/json" \
            -d '{
              "url": "https://kadeora.app",
              "name": "카더라",
              "packageId": "app.kadeora",
              "imageUrl": "https://kadeora.app/icons/icon-512.png",
              "splashColor": "#0d1117",
              "progressBarColor": "#FF4500",
              "statusBarColor": "#FF4500",
              "manifestUrl": "https://kadeora.app/manifest.json"
            }' -o kadeora-ios.zip || true

          if [ -f kadeora-ios.zip ]; then
            unzip -o kadeora-ios.zip -d project || true
            echo "iOS 프로젝트 생성 완료"
            ls -la project/ || true
          else
            echo "PWABuilder API 호출 실패 — 수동 생성 필요"
          fi

      - name: Build unsigned archive
        if: success()
        working-directory: ios-output/project
        run: |
          # xcworkspace 또는 xcodeproj 찾기
          WORKSPACE=$(find . -name "*.xcworkspace" -maxdepth 2 | head -1)
          PROJECT=$(find . -name "*.xcodeproj" -maxdepth 2 | head -1)

          if [ -n "$WORKSPACE" ]; then
            echo "빌드: $WORKSPACE"
            xcodebuild -workspace "$WORKSPACE" \
              -scheme "$(basename "$WORKSPACE" .xcworkspace)" \
              -configuration Release \
              -archivePath ./build/kadeora.xcarchive \
              archive \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO || true
          elif [ -n "$PROJECT" ]; then
            echo "빌드: $PROJECT"
            xcodebuild -project "$PROJECT" \
              -configuration Release \
              -archivePath ./build/kadeora.xcarchive \
              archive \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO || true
          else
            echo "Xcode 프로젝트를 찾을 수 없습니다"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kadeora-ios-build
          path: |
            ios-output/kadeora-ios.zip
            ios-output/project/build/
          if-no-files-found: warn
